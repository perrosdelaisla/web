<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <!-- Redirect de respaldo si no hay JS (no conserva el query string) -->
  <meta http-equiv="refresh" content="0; url=https://hablemos.perrosdelaisla.es/">
  <link rel="canonical" href="https://hablemos.perrosdelaisla.es/">
  <title>Hablemos — Perros de la Isla</title>
  <!-- Redirect JS inmediato: se ejecuta primero y CONSERVA el query string (?prueba=1, etc.) -->
  <script>
    location.replace("https://hablemos.perrosdelaisla.es/" + location.search);
  </script>
</head>
<body>
  <p>Te llevamos a nuestro asistente… Si no carga, <a href="https://hablemos.perrosdelaisla.es/">pulsa aquí</a>.</p>
</body>
</html>
